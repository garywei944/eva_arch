name: pre-commit

on:
  pull_request:
  push:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zsh luacheck

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install dependencies
        run: pip install pre-commit commitizen

      - name: Check commit messages (cz)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            # PRs: Check all commits between base and head
            cz check --rev-range ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}
          elif [ "${{ github.event_name }}" == "push" ]; then
            # Pushes: Check all commits between the previous state and the new state
            # Handles multiple commits in a single push
            cz check --rev-range ${{ github.event.before }}..${{ github.event.after }}
          fi

      - name: Run pre-commit
        run: |
          pre-commit run --all-files --show-diff-on-failure
