$HYPER = CTRL_R SHIFT_R ALT_R SUPER_R

# === Application Launchers ===
bind = SUPER, T, exec, kitty
bind = ALT, space, exec, dms ipc call spotlight toggle
bind = SUPER, V, exec, dms ipc call clipboard toggle
bind = SUPER, M, exec, dms ipc call processlist focusOrToggle
bind = SUPER, comma, exec, dms ipc call settings focusOrToggle
# bind = SUPER, N, exec, dms ipc call notifications toggle
# bind = SUPER SHIFT, N, exec, dms ipc call notepad toggle
# bind = SUPER, Y, exec, dms ipc call dankdash wallpaper
bind = SUPER, TAB, exec, dms ipc call hypr toggleOverview
bind = SUPER, X, exec, dms ipc call powermenu toggle

# === Cheat sheet
bind = SUPER SHIFT, Slash, exec, dms ipc call keybinds toggle hyprland

# === Security ===
bind = SUPER ALT, L, exec, dms ipc call lock lock
# bind = SUPER SHIFT, E, exit
# bind = CTRL ALT, Delete, exit Hyprland, exec, hyprctl dispatch exit 0
bind = CTRL ALT, Delete, exec, uwsm stop
# bind = CTRL ALT, Delete, exec, loginctl terminate-user ""
bind = CTRL SHIFT, Escape, exec, dms ipc call processlist focusOrToggle

# === Audio Controls ===
bindel = , XF86AudioRaiseVolume, exec, dms ipc call audio increment 2
bindel = , XF86AudioLowerVolume, exec, dms ipc call audio decrement 2
bindl = , XF86AudioMute, exec, dms ipc call audio mute
bindl = , XF86AudioMicMute, exec, dms ipc call audio micmute
bindl = , XF86AudioPause, exec, dms ipc call mpris playPause
bindl = , XF86AudioPlay, exec, dms ipc call mpris playPause
bindl = , XF86AudioPrev, exec, dms ipc call mpris previous
bindl = , XF86AudioNext, exec, dms ipc call mpris next
bindel = CTRL, XF86AudioRaiseVolume, exec, dms ipc call mpris increment 2
bindel = CTRL, XF86AudioLowerVolume, exec, dms ipc call mpris decrement 2

# === Brightness Controls ===
bindel = , XF86MonBrightnessUp, exec, dms ipc call brightness increment 5 ""
bindel = , XF86MonBrightnessDown, exec, dms ipc call brightness decrement 5 ""

# === Window Management ===
bind = ALT, F4, killactive
bind = SUPER, F, fullscreen, 1
bind = SUPER SHIFT, F, fullscreen, 0
bind = , F11, fullscreen, 0
bind = SUPER, up, fullscreen, 1
bind = SUPER, down, fullscreen, 1
bind = SUPER SHIFT, T, togglefloating
bind = SUPER, W, togglegroup
bind = SUPER SHIFT, W, exec, dms ipc call window-rules toggle

# === Focus Navigation ===
# bind = SUPER, left, movefocus, l
# bind = SUPER, down, movefocus, d
# bind = SUPER, up, movefocus, u
# bind = SUPER, right, movefocus, r
# bind = SUPER, H, movefocus, l
# bind = SUPER, J, movefocus, d
# bind = SUPER, K, movefocus, u
# bind = SUPER, L, movefocus, r
bind = SUPER, Y, movefocus, l
bind = SUPER, H, movefocus, d
bind = SUPER, A, movefocus, u
bind = SUPER, E, movefocus, r

# === Window Movement ===
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, down, movewindow, d
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER, left, movewindow, l
bind = SUPER, right, movewindow, r
# bind = SUPER SHIFT, H, movewindow, l
# bind = SUPER SHIFT, J, movewindow, d
# bind = SUPER SHIFT, K, movewindow, u
# bind = SUPER SHIFT, H, movewindow, r
bind = SUPER SHIFT, Y, movewindow, l
bind = SUPER SHIFT, H, movewindow, d
bind = SUPER SHIFT, A, movewindow, u
bind = SUPER SHIFT, E, movewindow, r

# === Column Navigation ===
bind = SUPER, Home, focuswindow, first
bind = SUPER, End, focuswindow, last

# === Monitor Navigation ===
bind = SUPER CTRL, left, focusmonitor, l
bind = SUPER CTRL, right, focusmonitor, r
# bind = SUPER CTRL, H, focusmonitor, l
# bind = SUPER CTRL, J, focusmonitor, d
# bind = SUPER CTRL, K, focusmonitor, u
# bind = SUPER CTRL, L, focusmonitor, r
bind = SUPER CTRL, Y, focusmonitor, l
bind = SUPER CTRL, H, focusmonitor, d
bind = SUPER CTRL, A, focusmonitor, u
bind = SUPER CTRL, E, focusmonitor, r

# === Move to Monitor ===
bind = SUPER SHIFT CTRL, left, movewindow, mon:l
bind = SUPER SHIFT CTRL, down, movewindow, mon:d
bind = SUPER SHIFT CTRL, up, movewindow, mon:u
bind = SUPER SHIFT CTRL, right, movewindow, mon:r
bind = SUPER SHIFT CTRL, Y, movewindow, mon:l
bind = SUPER SHIFT CTRL, H, movewindow, mon:d
bind = SUPER SHIFT CTRL, A, movewindow, mon:u
bind = SUPER SHIFT CTRL, E, movewindow, mon:r

# === Workspace Navigation ===
bind = SUPER, Page_Down, split:workspace, e+1
bind = SUPER, Page_Up, split:workspace, e-1
bind = SUPER, N, split:workspace, e+1
bind = SUPER, p, split:workspace, e-1
bind = SUPER CTRL, down, split:movetoworkspace, e+1
bind = SUPER CTRL, up, split:movetoworkspace, e-1
bind = SUPER CTRL, N, split:movetoworkspace, e+1
bind = SUPER CTRL, P, split:movetoworkspace, e-1

# === Workspace Management ===
bind = CTRL SHIFT, R, exec, dms ipc call workspace-rename open

# === Move Workspaces ===
bind = SUPER SHIFT, Page_Down, split:movetoworkspace, e+1
bind = SUPER SHIFT, Page_Up, split:movetoworkspace, e-1
bind = SUPER SHIFT, N, split:movetoworkspace, e+1
bind = SUPER SHIFT, P, split:movetoworkspace, e-1

# === Mouse Wheel Navigation ===
bind = SUPER, mouse_down, split:workspace, e+1
bind = SUPER, mouse_up, split:workspace, e-1
bind = SUPER CTRL, mouse_down, split:movetoworkspace, e+1
bind = SUPER CTRL, mouse_up, split:movetoworkspace, e-1

# === Numbered Workspaces ===
bind = SUPER, 1, split:workspace, 1
bind = SUPER, 2, split:workspace, 2
bind = SUPER, 3, split:workspace, 3
bind = SUPER, 4, split:workspace, 4
bind = SUPER, 5, split:workspace, 5
bind = SUPER, 6, split:workspace, 6
bind = SUPER, 7, split:workspace, 7
bind = SUPER, 8, split:workspace, 8
bind = SUPER, 9, split:workspace, 9

# === Move to Numbered Workspaces ===
bind = SUPER SHIFT, 1, split:movetoworkspace, 1
bind = SUPER SHIFT, 2, split:movetoworkspace, 2
bind = SUPER SHIFT, 3, split:movetoworkspace, 3
bind = SUPER SHIFT, 4, split:movetoworkspace, 4
bind = SUPER SHIFT, 5, split:movetoworkspace, 5
bind = SUPER SHIFT, 6, split:movetoworkspace, 6
bind = SUPER SHIFT, 7, split:movetoworkspace, 7
bind = SUPER SHIFT, 8, split:movetoworkspace, 8
bind = SUPER SHIFT, 9, split:movetoworkspace, 9

# === Column Management ===
bind = SUPER, bracketleft, layoutmsg, preselect l
bind = SUPER, bracketright, layoutmsg, preselect r

# === Sizing & Layout ===
bind = SUPER, R, layoutmsg, togglesplit
bind = SUPER CTRL, F, resizeactive, exact 100%

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindmd = SUPER, mouse:272, Move window, movewindow
bindmd = SUPER, mouse:273, Resize window, resizewindow

# === Move/resize windows with mainMod + LMB/RMB and dragging ===
bindd = SUPER, code:20, Expand window left, resizeactive, -100 0
bindd = SUPER, code:21, Shrink window left, resizeactive, 100 0

# === Manual Sizing ===
binde = SUPER, minus, resizeactive, -10% 0
binde = SUPER, equal, resizeactive, 10% 0
binde = SUPER SHIFT, minus, resizeactive, 0 -10%
binde = SUPER SHIFT, equal, resizeactive, 0 10%

# === Screenshots ===
bind = , Print, exec, dms screenshot
bind = CTRL, Print, exec, dms screenshot full
bind = ALT, Print, exec, dms screenshot window

# === System Controls ===
bind = SUPER SHIFT, P, dpms, toggle

bind = SUPER, Space, easymotion, action:hyprctl dispatch focuswindow address:{}
bind = $HYPER, B, exec, google-chrome-stable
bind = $HYPER, E, exec, dolphin
bind = $HYPER, M, exec, qqmusic
bind = $HYPER, W, exec, wechat
bind = $HYPER, D, exec, discord
bind = SUPER, B, exec, google-chrome-stable
# bind = SUPER, E, exec, dolphin
bind = SUPER, KP_Left, exec, qqmusic
bind = SUPER, KP_Home, exec, wechat
bind = SUPER, KP_Insert, exec, discord
